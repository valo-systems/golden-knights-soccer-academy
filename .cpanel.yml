---
deployment:
  tasks:
    - export DEPLOYPATH=/home/valosyst/public_html/goldenknightsfc.valosystems.co.za
    # Clear everything except .htaccess
    - /bin/mkdir -p $DEPLOYPATH
    - /bin/find $DEPLOYPATH -mindepth 1 -maxdepth 1 -not -name '.htaccess' -exec /bin/rm -rf {} +
    # Deploy SPA build
    - /bin/cp -R website/dist/. $DEPLOYPATH
    - /bin/cp website/.htaccess $DEPLOYPATH/.htaccess
    # Set permissions
    - /bin/find $DEPLOYPATH -type d -exec /bin/chmod 755 {} +
    - /bin/find $DEPLOYPATH -type f -exec /bin/chmod 644 {} +
