<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>GKSA Asset Preview</title>
  <style>
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, sans-serif; background:#111; color:white; }
    .hero { min-height:55vh; display:grid; place-items:center; background:#ee3030; }
    .hero img { width:min(340px,45vw); }
    .grid { padding:32px; display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:24px; }
    .card { background:#1d1d1d; border:1px solid #333; padding:20px; border-radius:16px; }
    .card img { max-width:100%; height:auto; display:block; margin:auto; }
    code { color:#ddd; font-size:12px; word-break:break-all; }
  </style>
</head>
<body>
  <section class="hero"><img src="gksa-logo-white-transparent-1024.png" alt="GKSA logo"></section>
  <section class="grid">
    <div class="card"><img src="apple-touch-icon.png"><code>apple-touch-icon.png</code></div>
    <div class="card"><img src="android-chrome-192x192.png"><code>android-chrome-192x192.png</code></div>
    <div class="card"><img src="maskable-icon-512x512.png"><code>maskable-icon-512x512.png</code></div>
    <div class="card"><img src="og-image-1200x630.jpg"><code>og-image-1200x630.jpg</code></div>
  </section>
</body>
</html>
